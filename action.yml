name: AI Code Review

description: Run AI code review against the current Git diff with configurable rulesets and OpenAI-compatible models.

inputs:
  project-types:
    description: Optional ruleset folders override, for example flutter, web, embedded, or web,embedded. Defaults to AI_REVIEW_PROJECT_TYPES.
    required: false
    default: ''
  extra-rulesets:
    description: Optional extra ruleset folders override. Defaults to AI_REVIEW_EXTRA_RULESETS.
    required: false
    default: ''
  rulesets-dir:
    description: Optional rulesets root directory override. Defaults to this action repository's rulesets directory.
    required: false
    default: ''
  model:
    description: Optional model override. Defaults to AI_REVIEW_MODEL from the caller environment, then script default.
    required: false
    default: ''
  base-url:
    description: Optional API base URL override. Defaults to AI_REVIEW_BASE_URL from the caller environment, then script default.
    required: false
    default: ''
  endpoint:
    description: Optional chat completions endpoint override. Defaults to AI_REVIEW_ENDPOINT, then base-url/chat/completions.
    required: false
    default: ''
  api-key:
    description: Optional API key override. Defaults to AI_REVIEW_API_KEY from the caller environment.
    required: false
    default: ''
  language:
    description: Review output language.
    required: false
    default: zh-CN
  chunk-bytes:
    description: Maximum bytes per AI review chunk.
    required: false
    default: ''
  max-chunks:
    description: Maximum number of diff chunks to review.
    required: false
    default: ''
  concurrency:
    description: Maximum concurrent model requests.
    required: false
    default: ''
  exclude-paths:
    description: Comma-separated diff path globs to exclude from review. Empty by default; configure in the target repository when needed.
    required: false
    default: ''
  timeout-seconds:
    description: Model request timeout in seconds.
    required: false
    default: ''
  output:
    description: Review report output path.
    required: false
    default: ai-review.md
  fail-on-findings:
    description: Whether to fail when P0/P1 findings are detected.
    required: false
    default: 'false'
  strict-rulesets:
    description: Whether missing ruleset directories should fail the action.
    required: false
    default: 'false'
  dry-run:
    description: Validate diff and rulesets without calling the model.
    required: false
    default: 'false'
  reporter:
    description: Output mode - summary, artifact, pr-comment (comma-separated).
    required: false
    default: summary,artifact
  github-token:
    description: GitHub token for PR comments or review annotations.
    required: false
    default: ${{ github.token }}
  retry-count:
    description: Max retries for 429/5xx model errors.
    required: false
    default: '2'
  fail-mode:
    description: fail-open (warn on error) or fail-closed (fail on error).
    required: false
    default: fail-open
  max-findings:
    description: Maximum findings to include in the report.
    required: false
    default: '50'

runs:
  using: composite
  steps:
    - name: Ensure Node.js
      shell: bash
      run: node --version

    - name: Run AI review
      shell: bash
      env:
        AI_REVIEW_PROJECT_TYPES_INPUT: ${{ inputs.project-types }}
        AI_REVIEW_EXTRA_RULESETS_INPUT: ${{ inputs.extra-rulesets }}
        AI_REVIEW_RULESETS_DIR_INPUT: ${{ inputs.rulesets-dir || format('{0}/rulesets', github.action_path) }}
        AI_REVIEW_MODEL_INPUT: ${{ inputs.model }}
        AI_REVIEW_BASE_URL_INPUT: ${{ inputs.base-url }}
        AI_REVIEW_ENDPOINT_INPUT: ${{ inputs.endpoint }}
        AI_REVIEW_API_KEY_INPUT: ${{ inputs.api-key }}
        AI_REVIEW_LANGUAGE_INPUT: ${{ inputs.language }}
        AI_REVIEW_CHUNK_BYTES_INPUT: ${{ inputs.chunk-bytes }}
        AI_REVIEW_MAX_CHUNKS_INPUT: ${{ inputs.max-chunks }}
        AI_REVIEW_CONCURRENCY_INPUT: ${{ inputs.concurrency }}
        AI_REVIEW_EXCLUDE_PATHS_INPUT: ${{ inputs.exclude-paths }}
        AI_REVIEW_TIMEOUT_SECONDS_INPUT: ${{ inputs.timeout-seconds }}
        AI_REVIEW_OUTPUT_INPUT: ${{ inputs.output }}
        AI_REVIEW_FAIL_ON_FINDINGS_INPUT: ${{ inputs.fail-on-findings }}
        AI_REVIEW_STRICT_RULESETS_INPUT: ${{ inputs.strict-rulesets }}
        AI_REVIEW_DRY_RUN_INPUT: ${{ inputs.dry-run }}
        AI_REVIEW_REPORTER_INPUT: ${{ inputs.reporter }}
        AI_REVIEW_GITHUB_TOKEN_INPUT: ${{ inputs.github-token }}
        AI_REVIEW_RETRY_COUNT_INPUT: ${{ inputs.retry-count }}
        AI_REVIEW_FAIL_MODE_INPUT: ${{ inputs.fail-mode }}
        AI_REVIEW_MAX_FINDINGS_INPUT: ${{ inputs.max-findings }}
      run: node "${{ github.action_path }}/scripts/ai_review.js"
