# 完整示例：Web 前端项目 AI Code Review
#
# 将此文件复制到你的仓库 .github/workflows/ 目录下即可使用。

name: AI Code Review

on:
  push:
    branches: [master]
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ai-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run AI review
        uses: banger0319/code_cr_AI@main
        with:
          # ---- 必填 ----
          project-types: web
          model: gpt-4.1-mini
          base-url: https://api.openai.com/v1
          api-key: ${{ secrets.AI_REVIEW_API_KEY }}

          # ---- 推荐配置 ----
          exclude-paths: 'package-lock.json,pnpm-lock.yaml,yarn.lock,dist/**,build/**,coverage/**,*.map,*.png,*.jpg,*.svg'

          # ---- 性能调优（按需调整）----
          # chunk-bytes: '60000'
          # max-chunks: '20'
          # concurrency: '3'
          # timeout-seconds: '600'

          # ---- 审查语言 ----
          # language: zh-CN

      - name: Upload AI review report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ai-review
          path: ai-review.md
