name: AI Code Review Dry Run

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

env:
  AI_REVIEW_PROJECT_TYPES: flutter
  AI_REVIEW_API_KEY: dry-run-placeholder

jobs:
  ai-review-dry-run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate AI review action
        uses: your-org/ai-review-action@main
        with:
          dry-run: 'true'
